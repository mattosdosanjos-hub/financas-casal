<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf9f7">
<title>Finanças T&D</title>
<meta name="description" content="Controle financeiro do casal — rápido, visual e com ajuda de IA.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanças T&D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="brand" id="brandName">Finanças T&D</span>
    <span class="topbar-month" id="topbarMonth"></span>
  </div>
</header>

<main id="view" class="view"></main>

<nav class="bottomnav" id="bottomnav">
  <button data-view="painel" class="nav-btn active"><span class="nav-ico">🏠</span><span>Painel</span></button>
  <button data-view="lancar" class="nav-btn"><span class="nav-ico">✏️</span><span>Lançar</span></button>
  <button data-view="invest" class="nav-btn"><span class="nav-ico">💎</span><span>Invest.</span></button>
  <button data-view="historico" class="nav-btn"><span class="nav-ico">🗓️</span><span>Histórico</span></button>
  <button data-view="config" class="nav-btn"><span class="nav-ico">⚙️</span><span>Config</span></button>
</nav>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script type="module" src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
